<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRDC 訂餐工具 - 賽博龐克風</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { touch-action: manipulation; background-color: #030712; color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .zoom-expanded { max-height: none !important; max-width: none !important; width: 150% !important; transition: width 0.25s ease; }
        .neon-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4), inset 0 0 10px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="flex flex-col justify-between min-h-screen font-sans overflow-x-hidden pt-[75px]">

    <header class="bg-slate-900/90 backdrop-blur-md shadow-lg border-b border-slate-800 py-3 px-4 fixed top-0 left-0 right-0 h-[75px] z-[100] flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <button id="backBtn" onclick="backToMenu()" class="hidden mr-2 p-2 bg-slate-800 hover:bg-slate-700 text-cyan-400 rounded-xl transition">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="bg-gradient-to-tr from-cyan-500 to-blue-600 text-slate-950 font-black w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/30 shrink-0">
                <i class="fa-solid fa-utensils text-sm"></i>
            </div>
            <div>
                <h1 class="text-base font-bold tracking-tight text-cyan-300 whitespace-nowrap">TRDC 訂餐工具</h1>
                <p class="text-[10px] text-cyan-500/70 whitespace-nowrap">CYBERPUNK v4.2.1</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-2">
            <div id="liveClock" class="font-mono text-sm md:text-base font-bold bg-slate-950 text-green-400 px-3.5 py-1.5 rounded-2xl border border-green-500/50 neon-glow flex items-center space-x-1.5 tracking-wider">
                <i class="fa-regular fa-clock text-xs text-red-400 animate-pulse"></i>
                <span>00:00:00</span>
            </div>
        </div>
    </header>

    <main id="mainMenu" class="flex-grow flex items-center justify-center px-4 md:px-8 py-6">
        <div id="loginPromptCard" class="w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-3xl p-8 text-center shadow-2xl space-y-6 backdrop-blur-md">
            <button onclick="openLoginIframe()" class="w-full group bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 active:scale-98 text-slate-950 font-black p-6 rounded-2xl shadow-lg shadow-cyan-500/20 transition duration-150 flex items-center justify-center space-x-3 cursor-pointer select-none">
                <div class="w-12 h-12 bg-slate-950/20 rounded-xl flex items-center justify-center text-xl">
                    <i class="fa-solid fa-lock-open text-slate-950"></i>
                </div>
                <span class="text-2xl tracking-wider">預先登入</span>
            </button>
            <p class="text-sm font-semibold text-slate-400">請先完成身分驗證</p>
        </div>

        <div id="menuOptionsContainer" class="w-full max-w-md md:max-w-4xl space-y-6 hidden">
            <button onclick="openMenu()" class="w-full flex items-center justify-between p-6 md:p-8 bg-slate-900/80 border border-slate-800 rounded-3xl shadow-lg hover:border-cyan-500/50 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-slate-950 border border-cyan-500/30 rounded-2xl flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-file-lines text-2xl md:text-3xl text-cyan-400"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-100 text-lg md:text-xl">1. 看一下菜單 🤔</h3>
                        <p class="text-xs md:text-base font-semibold text-slate-400 mt-1">查看本周最新菜單圖片</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-cyan-500 text-base md:text-lg pr-2"></i>
            </button>

            <button onclick="openOrderModal()" class="w-full flex items-center justify-between p-6 md:p-8 bg-slate-900/80 border border-slate-800 rounded-3xl shadow-lg hover:border-emerald-500/50 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-slate-950 border border-emerald-500/30 rounded-2xl flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-calendar-check text-2xl md:text-3xl text-emerald-400"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-100 text-lg md:text-xl">2. 直接訂餐 🤤</h3>
                        <p class="text-xs md:text-base font-semibold text-slate-400 mt-1">選擇日期並開啟訂餐系統</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-emerald-500 text-base md:text-lg pr-2"></i>
            </button>

            <button onclick="loadIframe('https://app.inventec.com/iServicePWA/DaxiOrderMeal.html?rid=A0001')" class="w-full flex items-center justify-between p-6 md:p-8 bg-slate-900/80 border border-slate-800 rounded-3xl shadow-lg hover:border-blue-500/50 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-slate-950 border border-blue-500/30 rounded-2xl flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-qrcode text-2xl md:text-3xl text-blue-400"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-100 text-lg md:text-xl">3. 看訂餐結果 & QRCode</h3>
                        <p class="text-xs md:text-base font-semibold text-slate-400 mt-1">查詢紀錄並出示取餐碼</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-blue-500 text-base md:text-lg pr-2"></i>
            </button>
        </div>
    </main>

    <div id="iframeContainer" class="w-full flex-grow hidden bg-slate-950">
        <iframe id="targetIframe" src="" class="w-full h-full border-none flex-grow" style="height: calc(100vh - 75px);"></iframe>
    </div>

    <footer id="mainFooter" class="py-4 text-center text-xs text-slate-500">
        <p>CYBERPUNK SYSTEM ACTIVE - 請依規定的工作日天數選擇正確的日期</p>
    </footer>

    <!-- 彈窗與JS邏輯與前面共用，此處省略重複結構以保持簡潔 -->
    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const span = document.querySelector('#liveClock span');
            if (span) span.textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        window.addEventListener('DOMContentLoaded', updateClock);
        function openLoginIframe() { alert('請接續您原本的登入頁面路由'); }
        function backToMenu() { document.getElementById('iframeContainer').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); }
    </script>
</body>
</html>
