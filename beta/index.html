<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRDC 訂餐工具 v3.9-Pixel</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome 圖標 (保留給標頭時鐘使用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ==================== 8-bit CSS 像素圖標專區 ==================== */
        /* 每個點大小為 2px * 2px，依據座標著色 */
        
        /* 1. 復古菜單/地圖圖標 (橘褐色系) */
        .pixel-menu {
            width: 2px; height: 2px;
            background: transparent;
            box-shadow:
                /* 左側摺頁 */
                4px 2px #c2410c, 6px 2px #c2410c, 4px 4px #ea580c, 6px 4px #ea580c, 4px 6px #ea580c, 6px 6px #ea580c, 4px 8px #ea580c, 6px 8px #ea580c, 4px 10px #ea580c, 6px 10px #ea580c, 4px 12px #c2410c, 6px 12px #c2410c,
                /* 中間摺頁 */
                8px 4px #b45309, 10px 4px #b45309, 8px 6px #d97706, 10px 6px #d97706, 8px 8px #d97706, 10px 8px #d97706, 8px 10px #d97706, 10px 10px #d97706, 8px 12px #d97706, 10px 12px #d97706, 8px 14px #b45309, 10px 14px #b45309,
                /* 右側摺頁 */
                12px 2px #c2410c, 14px 2px #c2410c, 12px 4px #ea580c, 14px 4px #ea580c, 12px 6px #ea580c, 14px 6px #ea580c, 12px 8px #ea580c, 14px 8px #ea580c, 12px 10px #ea580c, 14px 10px #ea580c, 12px 12px #c2410c, 14px 12px #c2410c;
        }

        /* 2. 復古日曆圖標 (綠色系) */
        .pixel-calendar {
            width: 2px; height: 2px;
            background: transparent;
            box-shadow:
                /* 上方兩個勾環 */
                6px 2px #047857, 12px 2px #047857, 6px 4px #047857, 12px 4px #047857,
                /* 日曆主體外框 */
                4px 6px #059669, 6px 6px #059669, 8px 6px #059669, 10px 6px #059669, 12px 6px #059669, 14px 6px #059669, 16px 6px #059669,
                4px 8px #059669, 16px 8px #059669,
                4px 10px #059669, 8px 10px #10b981, 12px 10px #10b981, 16px 10px #059669,
                4px 12px #059669, 10px 12px #10b981, 14px 12px #10b981, 16px 12px #059669,
                4px 14px #059669, 6px 14px #059669, 8px 14px #059669, 10px 14px #059669, 12px 14px #059669, 14px 14px #059669, 16px 14px #059669;
        }

        /* 3. 復古 QR Code 圖標 (藍色系) */
        .pixel-qrcode {
            width: 2px; height: 2px;
            background: transparent;
            box-shadow:
                /* 左上角迴路 */
                2px 2px #1d4ed8, 4px 2px #1d4ed8, 6px 2px #1d4ed8, 2px 4px #1d4ed8, 6px 4px #1d4ed8, 2px 6px #1d4ed8, 4px 6px #1d4ed8, 6px 6px #1d4ed8,
                /* 右上角迴路 */
                12px 2px #1d4ed8, 14px 2px #1d4ed8, 16px 2px #1d4ed8, 12px 4px #1d4ed8, 16px 4px #1d4ed8, 12px 6px #1d4ed8, 14px 6px #1d4ed8, 16px 6px #1d4ed8,
                /* 左下角迴路 */
                2px 12px #1d4ed8, 4px 12px #1d4ed8, 6px 12px #1d4ed8, 2px 14px #1d4ed8, 6px 14px #1d4ed8, 2px 16px #1d4ed8, 4px 16px #1d4ed8, 6px 16px #1d4ed8,
                /* 右下角散落碼 */
                12px 12px #3b82f6, 16px 14px #3b82f6, 14px 16px #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex justify-center items-start sm:py-8">

    <!-- 主容器 -->
    <div class="w-full max-w-md bg-white min-h-screen sm:min-h-[800px] sm:rounded-3xl shadow-xl overflow-hidden flex flex-col relative border border-slate-100">
        
        <!-- 頂部標頭列 -->
        <header class="bg-white px-5 py-4 flex justify-between items-center z-10">
            <div class="flex items-center space-x-3">
                <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-md shadow-blue-100">
                    <i class="fa-solid fa-utensils text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black text-slate-800 text-base tracking-wide">TRDC 訂餐工具</h1>
                    <p class="text-xs font-medium text-slate-400 mt-0.5">網頁快捷版 v3.9</p>
                </div>
            </div>
            
            <!-- 【秘密彩蛋觸發區域】：優化防放大時鐘 -->
            <div id="top-clock" style="touch-action: manipulation;" class="bg-[#111424] text-[#10B981] font-mono text-sm font-bold px-3 py-1.5 rounded-xl shadow-inner flex items-center space-x-1.5 select-none active:scale-95 transition cursor-pointer">
                <i class="fa-regular fa-clock text-xs"></i>
                <span id="live-clock">12:39:00</span>
            </div>
        </header>

        <!-- 選單內容主要區域 -->
        <main class="p-5 flex-1 space-y-4 overflow-y-auto no-scrollbar">
            
            <!-- 選項 1：看菜單 (像素風修改) -->
            <div class="bg-white border border-slate-100 rounded-3xl p-4 flex justify-between items-center shadow-sm hover:bg-slate-50 transition cursor-pointer">
                <div class="flex items-center space-x-4">
                    <!-- 像素外框容器 -->
                    <div class="w-14 h-14 bg-amber-50 border-2 border-amber-200/50 rounded-2xl flex items-center justify-center relative overflow-hidden">
                        <div class="pixel-menu scale-[2.2] transform translate-x-[-1px] translate-y-[-1px]"></div>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-800 text-base">1. 看一下菜單 🤔</h2>
                        <p class="text-xs font-semibold text-slate-400 mt-0.5">查看本周最新菜單圖片</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-sm pr-2"></i>
            </div>

            <!-- 選項 2：直接訂餐 (像素風修改) -->
            <div class="bg-white border border-slate-100 rounded-3xl p-4 flex justify-between items-center shadow-sm hover:bg-slate-50 transition cursor-pointer">
                <div class="flex items-center space-x-4">
                    <!-- 像素外框容器 -->
                    <div class="w-14 h-14 bg-emerald-50 border-2 border-emerald-200/50 rounded-2xl flex items-center justify-center relative overflow-hidden">
                        <div class="pixel-calendar scale-[2.2] transform translate-x-[-1px] translate-y-[-1px]"></div>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-800 text-base">2. 直接訂餐 🤤</h2>
                        <p class="text-xs font-semibold text-slate-400 mt-0.5">選擇日期並開啟訂餐系統</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-sm pr-2"></i>
            </div>

            <!-- 選項 3：看訂餐結果 (像素風修改) -->
            <div class="bg-white border border-slate-100 rounded-3xl p-4 flex justify-between items-center shadow-sm hover:bg-slate-50 transition cursor-pointer">
                <div class="flex items-center space-x-4">
                    <!-- 像素外框容器 -->
                    <div class="w-14 h-14 bg-blue-50 border-2 border-blue-200/50 rounded-2xl flex items-center justify-center relative overflow-hidden">
                        <div class="pixel-qrcode scale-[2.2] transform translate-x-[-1px] translate-y-[-1px]"></div>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-800 text-base">3. 看訂餐結果 & QRCode</h2>
                        <p class="text-xs font-semibold text-slate-400 mt-0.5">查詢紀錄並出示取餐碼</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-sm pr-2"></i>
            </div>

            <!-- ==================== ⚡ 隱藏彩蛋：觸發後才現身的第 4 個選項 ⚡ ==================== -->
            <div id="secret-option-4" class="hidden opacity-0 transform translate-y-4 transition-all duration-500 bg-slate-900 border border-slate-800 rounded-3xl p-4 justify-between items-center shadow-lg shadow-red-900/20 hover:bg-slate-850 cursor-pointer" onclick="copyBookmarkletCode()">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 bg-red-950/50 rounded-2xl flex items-center justify-center text-2xl border border-red-900/30">
                        🤖
                    </div>
                    <div>
                        <h2 class="font-black text-red-500 text-base flex items-center">
                            4. 隱藏版一鍵搶餐 <span class="ml-1.5 text-[10px] bg-red-600 text-white font-bold px-1.5 py-0.5 rounded-full animate-pulse">v6.1</span>
                        </h2>
                        <p class="text-xs font-bold text-slate-400 mt-0.5" id="secret-btn-text">點擊自動複製實境攔截碼</p>
                    </div>
                </div>
                <i class="fa-solid fa-copy text-red-500/70 text-sm pr-2"></i>
            </div>

            <!-- 底部提示文字 -->
            <div class="text-center pt-8">
                <p class="text-xs font-bold text-slate-300 tracking-wide">請依規定的工作天數選擇正確的日期</p>
            </div>
        </main>

    </div>

    <!-- ==================== JavaScript 邏輯控制區 ==================== -->
    <script>
        // 1. 即時時鐘更新
        function updateClock() {
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                const now = new Date();
                clockEl.textContent = String(now.getHours()).padStart(2, '0') + ':' +
                                      String(now.getMinutes()).padStart(2, '0') + ':' +
                                      String(now.getSeconds()).padStart(2, '0');
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 【防雙擊放大優化版 - 1秒6下極速時鐘彩蛋監聽】
        let trdcClickTimestamps = [];
        const clockTarget = document.getElementById('top-clock');

        if (clockTarget) {
            clockTarget.addEventListener('touchend', (e) => {
                e.preventDefault(); // 核心防禦：阻斷 iOS 雙擊放大畫面機制
                
                const now = Date.now();
                trdcClickTimestamps.push(now);
                
                if (trdcClickTimestamps.length > 6) {
                    trdcClickTimestamps.shift();
                }
                
                if (trdcClickTimestamps.length === 6 && (trdcClickTimestamps[5] - trdcClickTimestamps[0] <= 1000)) {
                    trdcClickTimestamps = []; 
                    triggerSecretOption();
                }
            });

            clockTarget.addEventListener('click', (e) => {
                if (e.screenX === 0 && e.screenY === 0) return; // 避免手機端重複計算
                
                const now = Date.now();
                trdcClickTimestamps.push(now);
                
                if (trdcClickTimestamps.length > 6) {
                    trdcClickTimestamps.shift();
                }
                
                if (trdcClickTimestamps.length === 6 && (trdcClickTimestamps[5] - trdcClickTimestamps[0] <= 1000)) {
                    trdcClickTimestamps = []; 
                    triggerSecretOption();
                }
            });
        }

        function triggerSecretOption() {
            const secretOpt = document.getElementById('secret-option-4');
            if (secretOpt) {
                secretOpt.style.display = 'flex'; 
                setTimeout(() => {
                    secretOpt.classList.remove('opacity-0', 'translate-y-4');
                }, 50);
                
                if (navigator.vibrate) navigator.vibrate([60, 40, 60]); 
            }
        }

        // 3. 點擊自動複製功能
        function copyBookmarkletCode() {
            var code = "javascript:(function(){if(window.trdc_robot_running){alert('🤖 運作中');return;}window.trdc_robot_running=true;var selectedElements=[];var panel=document.createElement('div');panel.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:999999;background:black;color:white;padding:12px;border-radius:16px;text-align:center;width:85%;max-width:320px;border:2px solid red;';panel.innerHTML='<div style=\"font-weight:bold;color:red;font-size:14px;\">🤖 TRDC 實境模式 (v6.1)</div><div id=\"status\" style=\"font-size:12px;color:gray;margin:6px 0;\">請依序點擊 1~3 個餐點時段</div><button id=\"lockbtn\" style=\"width:100%;background:red;color:white;border:none;padding:6px;border-radius:8px;font-weight:bold;\">🔒 鎖定配置</button>';document.body.appendChild(panel);var statusDiv=document.getElementById('status');var lockBtn=document.getElementById('lockbtn');function refreshBadges(){selectedElements.forEach(function(el,idx){var badge=el.querySelector('.t-num');if(!badge){badge=document.createElement('span');badge.className='t-num';badge.style.cssText='position:absolute;top:-4px;right:-4px;background:red;color:white;font-size:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;z-index:9999;';el.appendChild(badge);}badge.textContent=idx+1;el.style.outline='3px solid red';el.style.position='relative';});if(statusDiv)statusDiv.textContent='已選: '+selectedElements.length+' 個時段';}function clickHandler(e){if(this.id==='lockbtn'||this.closest('#lockbtn'))return;e.preventDefault();e.stopPropagation();var foundIdx=selectedElements.indexOf(this);if(foundIdx>-1){var badge=this.querySelector('.t-num');if(badge)badge.remove();this.style.outline='none';selectedElements.splice(foundIdx,1);refreshBadges();}else{if(selectedElements.length>=3){alert('最多只能選 3 個備案喔！');return;}selectedElements.push(this);refreshBadges();}}var allButtons=document.querySelectorAll('button, .time-grid, [class*=\"btn\"], [class*=\"item\"]');allButtons.forEach(function(btn){btn.addEventListener('click',clickHandler,true);});lockBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();if(selectedElements.length===0){alert('請至少選一個');return;}allButtons.forEach(function(btn){btn.removeEventListener('click',clickHandler,true);});statusDiv.innerHTML='🔒 優先度已鎖定！等待20:00...';lockBtn.style.display='none';var targetTexts=selectedElements.map(function(el){return(el.innerText||el.textContent||\"\").trim().replace(/\\s+/g,\' \');});var launchTimer=setInterval(function(){var btns=Array.from(document.querySelectorAll('button, .time-grid, [class*=\"btn\"], [class*=\"item\"]'));for(var i=0;i<targetTexts.length;i++){var targetText=targetTexts[i];var targetBtn=btns.find(function(b){var t=(b.innerText||b.textContent||\"\").trim().replace(/\\s+/g,\' \');return b.id!=='lockbtn'&&!b.closest('#lockbtn')&&t.indexOf(targetText)>-1&&!b.disabled&&t.indexOf('售罄')===-1;});if(targetBtn){clearInterval(launchTimer);targetBtn.click();setTimeout(function(){var subBtn=Array.from(document.querySelectorAll('button, a')).find(function(b){var t=(b.innerText||b.textContent||\"\").trim();return t.id!=='lockbtn'&&!b.closest('#lockbtn')&&(t.indexOf('確認')>-1||t.indexOf('訂餐')>-1||t.indexOf('送出')>-1);});if(subBtn)subBtn.click();statusDiv.textContent='🎉 已自動秒殺送出！';window.trdc_robot_running=false;},50);return;}}},100);});})();";
            
            navigator.clipboard.writeText(code).then(function() {
                const textEl = document.getElementById('secret-btn-text');
                if(textEl) {
                    textEl.textContent = "🎉 複製成功！快去新增手機書籤吧";
                    textEl.classList.remove('text-slate-400');
                    textEl.classList.add('text-emerald-400');
                    
                    setTimeout(() => {
                        textEl.textContent = "點擊自動複製實境攔截碼";
                        textEl.classList.remove('text-emerald-400');
                        textEl.classList.add('text-slate-400');
                    }, 3000);
                }
            }).catch(function() {
                alert("手機不支援自動複製，請改用電腦版。");
            });
        }
    </script>
</body>
</html>
