<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRDC 訂餐工具 v4.0.1-Modern</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            touch-action: manipulation;
        }
        
        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 點擊再放大的樣式 */
        .zoom-expanded {
            max-height: none !important;
            max-width: none !important;
            width: 150% !important;
            transition: width 0.25s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col justify-between min-h-screen font-sans overflow-x-hidden pt-[65px]">

    <!-- 迎賓登入閘門 (蓋住全螢幕) -->
    <div id="welcomeOverlay" class="fixed inset-0 bg-slate-900 z-[200] flex flex-col items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full border border-slate-700">
            <div class="w-20 h-20 bg-blue-600/20 text-blue-400 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i class="fa-solid fa-shield-halved text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">歡迎使用 TRDC 工具</h2>
            <p class="text-slate-400 text-sm mb-8">為確保各項功能正常運作，<br>請先進行身分驗證。</p>
            <button onclick="unlockApp()" class="w-full py-4 px-6 bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold rounded-xl transition shadow-lg shadow-blue-900/50 flex items-center justify-center space-x-3">
                <span>前往登入 iService</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </div>
    </div>

    <!-- 頂部標頭列 (調整為極致緊湊且居中) -->
    <header id="mainHeader" class="bg-white shadow-md border-b border-slate-100 py-3 px-4 fixed top-0 left-0 right-0 h-[65px] z-[100]">
        <div class="max-w-fit mx-auto flex items-center justify-center space-x-6 md:space-x-8 h-full">
            <div class="flex items-center space-x-3">
                <button id="backBtn" onclick="backToMenu()" class="hidden mr-2 p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="bg-blue-600 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-md shadow-blue-200">
                    <i class="fa-solid fa-utensils text-sm"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-tight whitespace-nowrap">TRDC 訂餐工具</h1>
                    <p class="text-[10px] text-slate-400 whitespace-nowrap">網頁快捷版 v4.0.1</p>
                </div>
            </div>
            
            <!-- 【秘密彩蛋觸發區域】：時鐘 (緊貼在標題右側) -->
            <div id="top-clock" style="touch-action: manipulation;" class="text-right flex items-center select-none active:scale-95 transition cursor-pointer">
                <div id="liveClock" class="font-mono text-base font-black bg-slate-900 text-green-400 px-3 py-1.5 rounded-xl border border-slate-800 shadow-xl flex items-center space-x-2 tracking-wider">
                    <i class="fa-regular fa-clock text-xs text-red-500"></i>
                    <span>00:00:00</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主選單內容區域 -->
    <main id="mainMenu" class="flex-grow flex items-center justify-center px-4 md:px-8 py-6">
        <div class="w-full max-w-md md:max-w-4xl space-y-6">
            
            <!-- 選項 1：看一下菜單 -->
            <button onclick="openMenu()" class="w-full flex items-center justify-between p-6 md:p-8 bg-white border border-slate-100 rounded-3xl shadow-sm hover:shadow-md hover:bg-slate-50 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-amber-50 to-orange-100/50 border border-amber-200/40 rounded-2xl flex items-center justify-center shadow-inner shrink-0">
                        <i class="fa-solid fa-file-lines text-2xl md:text-3xl text-orange-600"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800 text-lg md:text-xl">1. 看一下菜單 🤔</h3>
                        <p class="text-xs md:text-base font-semibold text-slate-400 mt-1">查看本周最新菜單圖片</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-base md:text-lg pr-2"></i>
            </button>

            <!-- 選項 2：直接訂餐 -->
            <button onclick="openOrderModal()" class="w-full flex items-center justify-between p-6 md:p-8 bg-white border border-slate-100 rounded-3xl shadow-sm hover:shadow-md hover:bg-slate-50 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-emerald-50 to-teal-100/50 border border-emerald-200/40 rounded-2xl flex items-center justify-center shadow-inner shrink-0">
                        <i class="fa-solid fa-calendar-check text-2xl md:text-3xl text-emerald-600"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800 text-lg md:text-xl">2. 直接訂餐 🤤</h3>
                        <p class="text-xs md:text-base font-semibold text-slate-400 mt-1">選擇日期並開啟訂餐系統</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-base md:text-lg pr-2"></i>
            </button>

            <!-- 選項 3：看訂餐結果 -->
            <button onclick="loadIframe('https://app.inventec.com/iServicePWA/DaxiOrderMeal.html?rid=A0001')" class="w-full flex items-center justify-between p-6 md:p-8 bg-white border border-slate-100 rounded-3xl shadow-sm hover:shadow-md hover:bg-slate-50 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-blue-50 to-indigo-100/50 border border-blue-200/40 rounded-2xl flex items-center justify-center shadow-inner shrink-0">
                        <i class="fa-solid fa-qrcode text-2xl md:text-3xl text-blue-600"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800 text-lg md:text-xl">3. 看訂餐結果 & QRCode</h3>
                        <p class="text-xs md:text-base font-semibold text-slate-400 mt-1">查詢紀錄並出示取餐碼</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-base md:text-lg pr-2"></i>
            </button>

            <!-- ==================== ⚡ 隱藏彩蛋：第四個選項 ⚡ ==================== -->
            <div id="secret-option-4" class="hidden opacity-0 transform translate-y-4 transition-all duration-500 bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 justify-between items-center shadow-lg shadow-red-900/20 hover:bg-slate-850 cursor-pointer" onclick="copyBookmarkletCode()">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-red-950/40 to-red-900/20 border border-red-900/40 rounded-2xl flex items-center justify-center shadow-inner shrink-0">
                        <i class="fa-solid fa-robot text-2xl md:text-3xl text-red-500"></i>
                    </div>
                    <div>
                        <h2 class="font-black text-red-500 text-lg md:text-xl flex items-center">
                            4. 隱藏版一鍵搶餐 <span class="ml-2 text-xs bg-red-600 text-white font-bold px-2 py-0.5 rounded-full animate-pulse">v6.1</span>
                        </h2>
                        <p class="text-xs md:text-base font-bold text-slate-400 mt-1" id="secret-btn-text">點擊自動複製實境攔截碼</p>
                    </div>
                </div>
                <i class="fa-solid fa-copy text-red-500/70 text-base md:text-lg pr-2"></i>
            </div>

        </div>
    </main>

    <!-- Iframe 容器畫面 -->
    <div id="iframeContainer" class="w-full flex-grow hidden bg-white">
        <iframe id="targetIframe" src="" class="w-full h-full border-none flex-grow" style="height: calc(100vh - 65px);"></iframe>
    </div>

    <!-- 頁尾提示 -->
    <footer id="mainFooter" class="py-4 text-center text-xs text-slate-400">
        <p>請依規定的工作日天數選擇正確的日期</p>
    </footer>

    <!-- 本周菜單彈窗 -->
    <div id="menuModal" class="fixed inset-x-0 bottom-0 top-[65px] bg-slate-900/70 backdrop-blur-sm z-[90] hidden justify-center items-center p-1 md:p-3 transition-all duration-300 opacity-0">
        <div class="bg-white w-[98vw] md:w-[96vw] h-[calc(100vh-75px)] rounded-2xl md:rounded-3xl shadow-2xl overflow-hidden transform translate-y-full md:translate-y-0 transition-transform duration-300 flex flex-col">
            <div class="px-6 py-3 border-b border-slate-100 flex justify-between items-center bg-slate-50 select-none shrink-0">
                <div class="flex flex-col">
                    <h3 class="font-bold text-slate-800 text-lg flex items-center">
                        <i class="fa-solid fa-image text-amber-500 mr-2"></i>本周菜單
                    </h3>
                    <span class="text-[11px] text-slate-400 font-medium">💡 可鼠標拖曳或點擊放大</span>
                </div>
                <button onclick="closeMenu(false)" class="text-slate-400 hover:text-slate-600 p-2">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>
            
            <!-- 內部全滿框滾動區域 -->
            <div id="dragContainer" class="flex-grow overflow-auto no-scrollbar p-2 md:p-4 bg-slate-100 relative cursor-grab select-none flex items-start justify-center">
                <div id="imageLoader" class="absolute inset-0 flex flex-col justify-center items-center bg-slate-100 space-y-2 z-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i>
                    <p class="text-xs text-slate-500">菜單圖片載入中...</p>
                </div>
                <!-- 圖片直上 100% 滿寬 -->
                <img id="menuImage" src="https://drive.google.com/thumbnail?sz=w1000&id=1BVJimgGuLN1J5GYFeayJQOg-0fj816Ku" 
                     alt="TRDC 菜單" 
                     class="w-full h-auto object-contain rounded-lg shadow-sm z-20 opacity-0 pointer-events-none block"
                     onload="handleImageLoaded()">
            </div>
            
            <div class="p-3 md:p-4 border-t border-slate-100 bg-white flex space-x-3 select-none shrink-0">
                <button onclick="closeMenu(false)" class="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition text-base">
                    關閉
                </button>
                <button onclick="closeMenu(true)" class="flex-1 py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl transition shadow-lg shadow-blue-200 text-base">
                    去訂餐 🤤
                </button>
            </div>
        </div>
    </div>

    <!-- 選擇日期彈窗 -->
    <div id="orderModal" class="fixed inset-x-0 bottom-0 top-[65px] bg-slate-900/60 backdrop-blur-sm z-[90] hidden justify-center items-end md:items-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white w-full max-w-md md:max-w-lg rounded-t-3xl md:rounded-3xl shadow-2xl overflow-hidden transform translate-y-full md:translate-y-0 transition-transform duration-300 flex flex-col">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 text-lg flex items-center">
                    <i class="fa-solid fa-calendar-days text-emerald-500 mr-2"></i>選擇訂餐日期
                </h3>
                <button onclick="closeOrderModal()" class="text-slate-400 hover:text-slate-600 p-1">
                    <i class="fa-solid fa-xmark text-xl text-slate-400"></i>
                </button>
            </div>
            <div class="p-6 bg-white space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">請選擇您要訂餐的日期：</label>
                    <input type="date" id="modalDateInput" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base font-medium text-slate-800">
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 bg-slate-50 flex space-x-3">
                <button onclick="closeOrderModal()" class="flex-1 py-3 px-4 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold rounded-xl transition">
                    取消
                </button>
                <button onclick="submitOrder()" class="flex-1 py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition shadow-lg shadow-blue-200 flex items-center justify-center space-x-2">
                    <span>確認前往訂餐</span>
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== JavaScript 邏輯控制區 ==================== -->
    <script>
        const menuModal = document.getElementById('menuModal');
        const menuModalContent = menuModal.querySelector('.transform');
        const menuImage = document.getElementById('menuImage');
        const imageLoader = document.getElementById('imageLoader');
        const dragContainer = document.getElementById('dragContainer');

        const orderModal = document.getElementById('orderModal');
        const orderModalContent = orderModal.querySelector('.transform');
        const modalDateInput = document.getElementById('modalDateInput');
        const liveClockSpan = document.querySelector('#liveClock span');

        const mainMenu = document.getElementById('mainMenu');
        const mainFooter = document.getElementById('mainFooter');
        const iframeContainer = document.getElementById('iframeContainer');
        const targetIframe = document.getElementById('targetIframe');
        const backBtn = document.getElementById('backBtn');

        // --- 0. 精準電子時鐘邏輯 ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            if (liveClockSpan) {
                liveClockSpan.textContent = `${hours}:${minutes}:${seconds}`;
            }
        }
        setInterval(updateClock, 1000);

        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            const today = new Date().toISOString().split('T')[0];
            modalDateInput.value = today;
        });

        // --- 1. 子母畫面切換核心 ---
        function loadIframe(url) {
            mainMenu.classList.add('hidden');
            mainFooter.classList.add('hidden');
            backBtn.classList.remove('hidden');
            iframeContainer.classList.remove('hidden');
            targetIframe.src = url;
        }

        function backToMenu() {
            iframeContainer.classList.add('hidden');
            backBtn.classList.add('hidden');
            targetIframe.src = ""; 
            mainMenu.classList.remove('hidden');
            mainFooter.classList.remove('hidden');
        }

        // --- 2. 菜單彈窗與縮放控制 ---
        function openMenu() {
            menuModal.classList.remove('hidden');
            menuModal.classList.add('flex');
            setTimeout(() => {
                menuModal.classList.add('opacity-100');
                menuModalContent.classList.remove('translate-y-full');
            }, 10);
        }

        function handleImageLoaded() {
            imageLoader.classList.add('hidden');
            menuImage.classList.remove('opacity-0');
        }

        function closeMenu(goToOrder = false) {
            if (menuImage) {
                menuImage.classList.remove('zoom-expanded');
            }
            menuModal.classList.remove('opacity-100');
            menuModalContent.classList.add('translate-y-full');
            setTimeout(() => {
                menuModal.classList.add('hidden');
                menuModal.classList.remove('flex');
                if (goToOrder) openOrderModal();
            }, 300);
        }

        // --- 3. 滑鼠拖曳（Drag to Scroll）與點擊放大邏輯 ---
        let isMouseDown = false;
        let startX, startY, scrollLeft, scrollTop;
        let isDragging = false;

        if (dragContainer) {
            dragContainer.addEventListener('mousedown', (e) => {
                isMouseDown = true;
                isDragging = false;
                dragContainer.classList.remove('cursor-grab');
                dragContainer.classList.add('cursor-grabbing');
                
                startX = e.pageX - dragContainer.offsetLeft;
                startY = e.pageY - dragContainer.offsetTop;
                scrollLeft = dragContainer.scrollLeft;
                scrollTop = dragContainer.scrollTop;
            });

            dragContainer.addEventListener('mouseleave', () => {
                isMouseDown = false;
                dragContainer.classList.remove('cursor-grabbing');
                dragContainer.classList.add('cursor-grab');
            });

            dragContainer.addEventListener('mouseup', () => {
                isMouseDown = false;
                dragContainer.classList.remove('cursor-grabbing');
                dragContainer.classList.add('cursor-grab');

                if (!isDragging) {
                    menuImage.classList.toggle('zoom-expanded');
                }
            });

            dragContainer.addEventListener('mousemove', (e) => {
                if (!isMouseDown) return;
                
                const x = e.pageX - dragContainer.offsetLeft;
                const y = e.pageY - dragContainer.offsetTop;
                const walkX = (x - startX);
                const walkY = (y - startY);

                if (Math.abs(walkX) > 5 || Math.abs(walkY) > 5) {
                    isDragging = true;
                    e.preventDefault();
                    dragContainer.scrollLeft = scrollLeft - walkX;
                    dragContainer.scrollTop = scrollTop - walkY;
                }
            });
        }

        // --- 4. 直接訂餐彈窗與傳值 ---
        function openOrderModal() {
            orderModal.classList.remove('hidden');
            orderModal.classList.add('flex');
            setTimeout(() => {
                orderModal.classList.add('opacity-100');
                orderModalContent.classList.remove('translate-y-full');
            }, 10);
        }

        function closeOrderModal() {
            orderModal.classList.remove('opacity-100');
            orderModalContent.classList.add('translate-y-full');
            setTimeout(() => {
                orderModal.classList.add('hidden');
                orderModal.classList.remove('flex');
            }, 300);
        }

        function submitOrder() {
            const selectedDate = modalDateInput.value;
            if (!selectedDate) {
                alert('請先選擇正確的日期喔！');
                return;
            }
            
            const targetUrl = `https://app.inventec.com/iServicePWA/OrderDailyMeals.html?dt=${selectedDate}&site=TRDC`;
            closeOrderModal();
            loadIframe(targetUrl);
        }

        // --- 5. 【極速時鐘彩蛋監聽】 ---
        let trdcClickTimestamps = [];
        const clockTarget = document.getElementById('top-clock');

        if (clockTarget) {
            clockTarget.addEventListener('touchend', (e) => {
                e.preventDefault(); 
                const now = Date.now();
                trdcClickTimestamps.push(now);
                if (trdcClickTimestamps.length > 6) trdcClickTimestamps.shift();
                if (trdcClickTimestamps.length === 6 && (trdcClickTimestamps[5] - trdcClickTimestamps[0] <= 1000)) {
                    trdcClickTimestamps = []; 
                    triggerSecretOption();
                }
            });

            clockTarget.addEventListener('click', (e) => {
                if (e.screenX === 0 && e.screenY === 0) return; 
                const now = Date.now();
                trdcClickTimestamps.push(now);
                if (trdcClickTimestamps.length > 6) trdcClickTimestamps.shift();
                if (trdcClickTimestamps.length === 6 && (trdcClickTimestamps[5] - trdcClickTimestamps[0] <= 1000)) {
                    trdcClickTimestamps = []; 
                    triggerSecretOption();
                }
            });
        }

        function triggerSecretOption() {
            const secretOpt = document.getElementById('secret-option-4');
            if (secretOpt) {
                secretOpt.style.display = 'flex'; 
                setTimeout(() => {
                    secretOpt.classList.remove('opacity-0', 'translate-y-4');
                }, 50);
                if (navigator.vibrate) navigator.vibrate([60, 40, 60]); 
            }
        }

        // --- 6. 點擊自動複製功能 ---
        function copyBookmarkletCode() {
            var code = "javascript:(function(){if(window.trdc_robot_running){alert('🤖 運作中');return;}window.trdc_robot_running=true;var selectedElements=[];var panel=document.createElement('div');panel.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:999999;background:black;color:white;padding:12px;border-radius:16px;text-align:center;width:85%;max-width:320px;border:2px solid red;';panel.innerHTML='<div style=\"font-weight:bold;color:red;font-size:14px;\">🤖 TRDC 實境模式 (v6.1)</div><div id=\"status\" style=\"font-size:12px;color:gray;margin:6px 0;\">請依序點擊 1~3 個餐點時段</div><button id=\"lockbtn\" style=\"width:100%;background:red;color:white;border:none;padding:6px;border-radius:8px;font-weight:bold;\">🔒 鎖定配置</button>';document.body.appendChild(panel);var statusDiv=document.getElementById('status');var lockBtn=document.getElementById('lockbtn');function refreshBadges(){selectedElements.forEach(function(el,idx){var badge=el.querySelector('.t-num');if(!badge){badge=document.createElement('span');badge.className='t-num';badge.style.cssText='position:absolute;top:-4px;right:-4px;background:red;color:white;font-size:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;z-index:9999;';el.appendChild(badge);}badge.textContent=idx+1;el.style.outline='3px solid red';el.style.position='relative';});if(statusDiv)statusDiv.textContent='已選: '+selectedElements.length+' 個時段';}function clickHandler(e){if(this.id==='lockbtn'||this.closest('#lockbtn'))return;e.preventDefault();e.stopPropagation();var foundIdx=selectedElements.indexOf(this);if(foundIdx>-1){var badge=this.querySelector('.t-num');if(badge)badge.remove();this.style.outline='none';selectedElements.splice(foundIdx,1);refreshBadges();}else{if(selectedElements.length>=3){alert('最多只能選 3 個備案喔！');return;}selectedElements.push(this);refreshBadges();}}var allButtons=document.querySelectorAll('button, .time-grid, [class*=\"btn\"], [class*=\"item\"]');allButtons.forEach(function(btn){btn.addEventListener('click',clickHandler,true);});lockBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();if(selectedElements.length===0){alert('請至少選一個');return;}allButtons.forEach(function(btn){btn.removeEventListener('click',clickHandler,true);});statusDiv.innerHTML='🔒 優先度已鎖定！等待20:00...';lockBtn.style.display='none';var targetTexts=selectedElements.map(function(el){return(el.innerText||el.textContent||\"\").trim().replace(/\\s+/g,\' \');});var launchTimer=setInterval(function(){var btns=Array.from(document.querySelectorAll('button, .time-grid, [class*=\"btn\"], [class*=\"item\"]'));for(var i=0;i<targetTexts.length;i++){var targetText=targetTexts[i];var targetBtn=btns.find(function(b){var t=(b.innerText||b.textContent||\"\").trim().replace(/\\s+/g,\' \');return b.id!=='lockbtn'&&!b.closest('#lockbtn')&&t.indexOf(targetText)>-1&&!b.disabled&&t.indexOf('售罄')===-1;});if(targetBtn){clearInterval(launchTimer);targetBtn.click();setTimeout(function(){var subBtn=Array.from(document.querySelectorAll('button, a')).find(function(b){var t=(b.innerText||b.textContent||\"\").trim();return t.id!=='lockbtn'&&!b.closest('#lockbtn')&&(t.indexOf('確認')>-1||t.indexOf('訂餐')>-1||t.indexOf('送出')>-1);});if(subBtn)subBtn.click();statusDiv.textContent='🎉 已自動秒殺送出！';window.trdc_robot_running=false;},50);return;}}},100);});})();";
            
            navigator.clipboard.writeText(code).then(function() {
                const textEl = document.getElementById('secret-btn-text');
                if(textEl) {
                    textEl.textContent = "🎉 複製成功！快去新增手機書籤吧";
                    textEl.classList.remove('text-slate-400');
                    textEl.classList.add('text-emerald-400');
                    
                    setTimeout(() => {
                        textEl.textContent = "點擊自動複製實境攔截碼";
                        textEl.classList.remove('text-emerald-400');
                        textEl.classList.add('text-slate-400');
                    }, 3000);
                }
            }).catch(function() {
                alert("手機不支援自動複製，請改用電腦版。");
            });
        }

        // --- 7. 迎賓登入閘門解鎖 ---
        function unlockApp() {
            // 1. 打開官方網頁讓使用者登入 (跳出新分頁)
            window.open('https://app.inventec.com/iServicePWA/', '_blank');
            
            // 2. 解鎖工具主畫面 (淡出動畫)
            const overlay = document.getElementById('welcomeOverlay');
            overlay.classList.add('opacity-0');
            
            // 3. 等待淡出動畫結束後徹底隱藏
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 500);
        }
    </script>
