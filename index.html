<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRDC 訂餐工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 避免手機瀏覽器雙擊縮放的延遲 */
        touch-action: manipulation;
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col justify-between min-h-screen font-sans">

    <header class="bg-white shadow-sm border-b border-slate-100 py-5 px-6 sticky top-0 z-10">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-500 text-white p-2 rounded-xl shadow-md shadow-blue-200">
                    <i class="fa-solid fa-utensils text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">TRDC 訂餐工具</h1>
                    <p class="text-xs text-slate-400">網頁快捷版 v2.9</p>
                </div>
            </div>
            <span class="inline-flex items-center rounded-full bg-green-50 px-2 py-1 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">大溪廠</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 py-8">
        <div class="w-full max-w-md space-y-4">
            
            <button onclick="openMenu()" class="w-full flex items-center justify-between p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-300 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-4">
                    <div class="bg-amber-100 text-amber-600 p-3 rounded-xl">
                        <i class="fa-solid fa-map-marked-alt text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800">1. 看一下菜單 🤔</h3>
                        <p class="text-sm text-slate-500">查看本周最新菜單圖片</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-400"></i>
            </button>

            <button onclick="openOrderModal()" class="w-full flex items-center justify-between p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-300 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-4">
                    <div class="bg-emerald-100 text-emerald-600 p-3 rounded-xl">
                        <i class="fa-solid fa-calendar-check text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800">2. 直接訂餐 🤤</h3>
                        <p class="text-sm text-slate-500">選擇日期並開啟訂餐系統</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-400"></i>
            </button>

            <button onclick="goToResult()" class="w-full flex items-center justify-between p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-300 active:scale-98 transition duration-150 text-left">
                <div class="flex items-center space-x-4">
                    <div class="bg-blue-100 text-blue-600 p-3 rounded-xl">
                        <i class="fa-solid fa-qrcode text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800">3. 看訂餐結果 & QRCode</h3>
                        <p class="text-sm text-slate-500">查詢紀錄並出示取餐碼</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-400"></i>
            </button>

        </div>
    </main>

    <footer class="py-6 text-center text-xs text-slate-400">
        <p>請依規定的工作日天數選擇正確的日期</p>
    </footer>

    <div id="menuModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden justify-center items-end sm:items-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden transform translate-y-full sm:translate-y-0 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 text-lg flex items-center">
                    <i class="fa-solid fa-image text-amber-500 mr-2"></i>本周菜單
                </h3>
                <button onclick="closeMenu(false)" class="text-slate-400 hover:text-slate-600 p-1">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="flex-grow overflow-y-auto p-4 flex flex-col justify-center items-center bg-slate-100 min-h-[300px] relative">
                <div id="imageLoader" class="absolute inset-0 flex flex-col justify-center items-center bg-slate-100 space-y-2 z-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i>
                    <p class="text-xs text-slate-500">菜單圖片載入中...</p>
                </div>
                <img id="menuImage" src="https://drive.google.com/thumbnail?sz=w1000&id=1BVJimgGuLN1J5GYFeayJQOg-0fj816Ku" 
                     alt="TRDC 菜單" 
                     class="max-w-full max-h-[50vh] object-contain rounded-lg shadow-sm z-20 transition-opacity duration-300"
                     onload="handleImageLoaded()">
            </div>
            <div class="p-5 border-t border-slate-100 bg-white flex space-x-3">
                <button onclick="closeMenu(false)" class="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition">
                    關閉
                </button>
                <button onclick="closeMenu(true)" class="flex-1 py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition shadow-lg shadow-blue-200">
                    去訂餐 🤤
                </button>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden justify-center items-end sm:items-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden transform translate-y-full sm:translate-y-0 transition-transform duration-300 flex flex-col">
            
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 text-lg flex items-center">
                    <i class="fa-solid fa-calendar-days text-emerald-500 mr-2"></i>選擇訂餐日期
                </h3>
                <button onclick="closeOrderModal()" class="text-slate-400 hover:text-slate-600 p-1">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="p-6 bg-white space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">請點擊下方欄位選擇日期：</label>
                    <div class="relative">
                        <input type="date" id="modalDateInput" 
                               class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base font-medium text-slate-800">
                    </div>
                </div>
                <p class="text-xs text-slate-400 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    💡 提示：點擊上方欄位開啟行事曆，選好日期後，請點擊下方藍色按鈕送出。
                </p>
            </div>

            <div class="p-5 border-t border-slate-100 bg-slate-50 flex space-x-3">
                <button onclick="closeOrderModal()" class="flex-1 py-3 px-4 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold rounded-xl transition">
                    取消
                </button>
                <button onclick="submitOrder()" class="flex-1 py-3 px-4 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-xl transition shadow-lg shadow-emerald-200 flex items-center justify-center space-x-2">
                    <span>確認前往訂餐</span>
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 取得彈窗元素
        const menuModal = document.getElementById('menuModal');
        const menuModalContent = menuModal.querySelector('.transform');
        const menuImage = document.getElementById('menuImage');
        const imageLoader = document.getElementById('imageLoader');

        const orderModal = document.getElementById('orderModal');
        const orderModalContent = orderModal.querySelector('.transform');
        const modalDateInput = document.getElementById('modalDateInput');

        // 初始化：預設將日期欄位帶入今天 (方便使用者，但不會自動跳轉)
        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            modalDateInput.value = today;
        });

        // --- 1. 菜單彈窗控制 ---
        function openMenu() {
            menuModal.classList.remove('hidden');
            menuModal.classList.add('flex');
            setTimeout(() => {
                menuModal.classList.add('opacity-100');
                menuModalContent.classList.remove('translate-y-full');
            }, 10);
        }

        function handleImageLoaded() {
            imageLoader.classList.add('hidden');
            menuImage.classList.remove('opacity-0');
        }

        function closeMenu(goToOrder = false) {
            menuModal.classList.remove('opacity-100');
            menuModalContent.classList.add('translate-y-full');
            setTimeout(() => {
                menuModal.classList.add('hidden');
                menuModal.classList.remove('flex');
                if (goToOrder) {
                    openOrderModal(); // 從菜單可以直接導向打開日期彈窗
                }
            }, 300);
        }

        // --- 2. 訂餐日期彈窗控制 (終極防呆) ---
        function openOrderModal() {
            orderModal.classList.remove('hidden');
            orderModal.classList.add('flex');
            setTimeout(() => {
                orderModal.classList.add('opacity-100');
                orderModalContent.classList.remove('translate-y-full');
            }, 10);
        }

        function closeOrderModal() {
            orderModal.classList.remove('opacity-100');
            orderModalContent.classList.add('translate-y-full');
            setTimeout(() => {
                orderModal.classList.add('hidden');
                orderModal.classList.remove('flex');
            }, 300);
        }

        // 使用者真正按下「確認前往訂餐」才進行網域跳轉
        function submitOrder() {
            const selectedDate = modalDateInput.value;
            if (!selectedDate) {
                alert('請先選擇正確的日期喔！');
                return;
            }
            
            const targetUrl = `https://app.inventec.com/iServicePWA/OrderDailyMeals.html?dt=${selectedDate}&site=TRDC`;
            window.location.href = targetUrl;
        }

        // --- 3. 看訂餐結果 ---
        function goToResult() {
            window.location.href = 'https://app.inventec.com/iServicePWA/DaxiOrderMeal.html?rid=A0001';
        }
    </script>
</body>
</html>
